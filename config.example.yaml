server:
  addr: ":8080"

download:
  # Optional path to yt-dlp cookies.txt file.
  cookies_path: ""

asr:
  base_url: "http://localhost:8001"
  timeout: "10m"
  language: "zh"
  model:
    provider: "whisper"
    name: "./models/whisper-small"
    device: "auto"
    torch_dtype: "auto"
    compute_type: "default"
    cpu_threads: 0
    workers: 1
  transcribe:
    beam_size: 5
    vad_filter: true
    initial_prompt: ""
    vad:
      threshold: 0.3
      min_speech_duration_ms: 100
      min_silence_duration_ms: 500
      speech_pad_ms: 600
  stream:
    enabled: true
    sample_rate: 16000
    chunk_size: 1600
    max_buffer_seconds: 30
    vad:
      threshold: 0.5
      min_speech_duration_ms: 250
      min_silence_duration_ms: 200
      speech_pad_ms: 100
      max_speech_duration_s: 30

video_summary:
  base_url: "http://localhost:8002"
  timeout: "20m"
  model:
    name: "./models/marlin"
    provider: "huggingface"
    device: "auto"
    dtype: "bfloat16"
    compile: false
  summarize:
    max_new_tokens: 2048
    prompt: ""
    do_sample: false
    temperature: 1.0
    top_p: 1.0

llm:
  enabled: true
  fallback_to_raw_on_error: true
  provider: "openai"
  model: ""
  base_url: ""
  api_key: ""
  api_key_env: "OPENAI_API_KEY"
  timeout: "2m"
  temperature: 0.2
  max_tokens: 512
  path: ""
  keep_alive: ""
  chunk_runes: 2000
  two_step: false
  step1_chunk_runes: 800
  step1_prompt:
    system: |
      你是中文文本纠错助手。
      任务：
        - 修正错别字
        - 繁体中文转简体中文
      禁止：
        - 改写句子
        - 调整段落
        - 增加或删除内容
      输出：
        - 仅返回纠正后的文本
    user_template: "{{text}}"
  prompt:
    system: |
      你是专业的中文转写稿编辑。你的任务是只对转写文本进行自然段划分和轻微格式整理。

      要求：
      1. 保留原文语义，不总结、不扩写、不改写事实。
      2. 修正明显的断句和空白、错别字问题。
      3. 按话题、语义停顿和上下文划分段落。
      4. 段落之间使用一个空行分隔。
      5. 不要添加标题、列表、Markdown 标记或解释。
    user_template: |
      请为下面的转写文本划分自然段，只返回处理后的正文：

      {{text}}

mysql:
  dsn: "video_extractor:password@tcp(localhost:3306)/video_extractor?parseTime=true"
  max_open: 10
  max_idle: 5

qdrant:
  host: "localhost"
  port: 6334
  api_key: ""
  use_tls: false
  collection: "transcript_chunks"
  vector_dim: 1024

embedding:
  base_url: "http://localhost:8003"
  # Model shortcut (qwen, bge, bge-large) or local path.
  # Download first:
  #   huggingface-cli download Qwen/Qwen3-Embedding-0.6B --local-dir ./models/qwen3-embedding
  #   huggingface-cli download BAAI/bge-m3 --local-dir ./models/bge-m3
  model: "qwen"
  device: "auto"
  timeout: "2m"

rerank:
  base_url: "http://localhost:8003"
  model: "qwen"
  top_k: 3
  timeout: "1m"

mcp:
  enabled: true
  addr: ":8082"
  mode: "sse"

upload:
  chunk_runes: 1024
  overlap_runes: 128
  max_file_bytes: 10485760 # 10 MB
