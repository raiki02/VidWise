<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VidWise — RAG Chat</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body {
      margin: 0;
      background: #0f1115;
      color: #e6e6e6;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* Sidebar */
    aside {
      width: 260px;
      background: #171a21;
      padding: 16px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #2f3642;
      flex-shrink: 0;
    }
    aside h2 { font-size: 18px; margin: 0 0 12px; }
    aside .nav-item {
      display: block;
      padding: 10px 12px;
      border-radius: 8px;
      color: #b0b8c4;
      text-decoration: none;
      font-size: 14px;
      margin-bottom: 4px;
      transition: background 0.15s;
    }
    aside .nav-item:hover, aside .nav-item.active { background: #2f3642; color: #fff; }
    aside .nav-item.active { font-weight: 600; color: #3b82f6; }
    aside hr { border: none; border-top: 1px solid #2f3642; margin: 16px 0; }

    /* Sessions list */
    #session-list { flex: 1; overflow-y: auto; margin: 0 -8px; padding: 0 8px; }
    #session-list .sess {
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      margin-bottom: 2px;
      color: #b0b8c4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: background 0.15s;
    }
    #session-list .sess:hover { background: #2f3642; }
    #session-list .sess.active { background: #2f3642; color: #fff; font-weight: 600; }
    #session-list .sess .time { font-size: 11px; color: #666; display: block; }

    aside .btn {
      display: block;
      width: 100%;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #3b82f6;
      background: transparent;
      color: #3b82f6;
      font-size: 13px;
      cursor: pointer;
      margin-top: 8px;
      text-align: center;
    }
    aside .btn:hover { background: #3b82f6; color: #fff; }
    aside .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
    aside .status-dot.ok { background: #22c55e; }
    aside .status-dot.err { background: #ef4444; }
    aside .config-row { font-size: 12px; color: #98a2b3; margin-bottom: 8px; }

    /* Main chat area */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
    }
    header {
      padding: 16px 24px;
      border-bottom: 1px solid #2f3642;
      font-weight: 600;
      font-size: 16px;
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #tab-chat { flex:1; display:flex; flex-direction:column; min-height:0; }
    #tab-extract, #tab-format { display:none; flex:1; overflow-y:auto; padding:24px; }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .msg {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user { align-self: flex-end; background: #3b82f6; color: #fff; }
    .msg.assistant { align-self: flex-start; background: #1e2430; border: 1px solid #2f3642; }
    .msg .sources { margin-top: 10px; font-size: 12px; color: #98a2b3; border-top: 1px solid #2f3642; padding-top: 8px; }
    .msg .sources details { cursor: pointer; }
    .msg .sources summary { font-weight: 600; margin-bottom: 4px; }
    .msg .sources .chunk {
      margin-bottom: 6px; padding: 6px 8px; background: #0f1115; border-radius: 6px; font-size: 12px;
    }

    /* Input */
    .input-area {
      padding: 12px 24px 20px;
      border-top: 1px solid #2f3642;
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }
    .input-area textarea {
      flex: 1;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid #2f3642;
      background: #171a21;
      color: #e6e6e6;
      font-size: 14px;
      resize: none;
      min-height: 44px;
      max-height: 120px;
      font-family: inherit;
    }
    .input-area button {
      padding: 10px 20px;
      border: none;
      border-radius: 12px;
      background: #3b82f6;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
    }
    .input-area button:disabled { opacity: 0.6; cursor: not-allowed; }

    /* Loading */
    .typing::after { content: ""; animation: dots 1.5s steps(4, end) infinite; }
    @keyframes dots {
      0% { content: ""; } 25% { content: "."; } 50% { content: ".."; } 75% { content: "..."; } 100% { content: ""; }
    }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      padding: 10px 20px; border-radius: 8px; font-size: 14px; z-index: 999;
      background: #171a21; border: 1px solid #2f3642; color: #e6e6e6;
      animation: fadeIn 0.2s ease;
    }
    .toast.error { border-color: #ef4444; color: #fca5a5; }
    @keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

    @media (max-width: 640px) {
      body { flex-direction: column; }
      aside { width: 100%; border-right: none; border-bottom: 1px solid #2f3642; padding: 12px; }
      .msg { max-width: 95%; }
    }
  </style>
</head>
<body>

<aside>
  <h2>VidWise</h2>
  <a class="nav-item active" href="#" onclick="switchTab('chat', this)">RAG 知识库问答</a>
  <a class="nav-item" href="#" onclick="switchTab('extract', this)">视频提取</a>
  <a class="nav-item" href="#" onclick="switchTab('format', this)">文本格式化</a>

  <hr>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
    <span style="font-size:13px;font-weight:600;color:#98a2b3;">历史会话</span>
    <button class="btn" style="width:auto;margin:0;padding:4px 12px;font-size:12px;" onclick="newChat()">+ 新对话</button>
  </div>
  <div id="session-list"></div>

  <hr>
  <div class="config-row">
    <span class="status-dot" id="rag-status-dot"></span>
    <span id="rag-status-text">检测中...</span>
  </div>
</aside>

<div class="main">
  <header id="chat-header">RAG 知识库问答</header>

  <!-- Chat tab -->
  <div id="tab-chat">
    <div id="messages">
      <div class="msg assistant">
        👋 你好！这是你的视频知识库问答助手。<br><br>
        <strong>使用步骤：</strong><br>
        1. 在"视频提取"页面上传视频获取文本并索引到知识库<br>
        2. 点击左侧"新对话"开始聊天<br>
        3. 提出你的问题，我会从知识库中检索相关内容并结合对话历史回答<br>
        <br>
        对话会自动保存，左侧可以切换历史会话。
      </div>
    </div>
    <div class="input-area">
      <textarea id="chat-input" placeholder="输入你的问题..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
      <button id="send-btn" onclick="sendMessage()">发送</button>
    </div>
  </div>

  <!-- Extract tab -->
  <div id="tab-extract">
    <form id="extract-form" style="display:grid;gap:16px;background:#171a21;border-radius:12px;padding:20px;max-width:600px;">
      <div>
        <label style="font-weight:600;">视频 URL</label>
        <input id="extract-url" style="width:100%;padding:10px;border-radius:8px;border:1px solid #2f3642;background:#0f1115;color:#e6e6e6;font-size:14px;box-sizing:border-box;" placeholder="https://example.com/video" />
      </div>
      <div style="display:grid;gap:16px;grid-template-columns:1fr 1fr;">
        <div>
          <label style="font-weight:600;">名称</label>
          <input id="extract-name" style="width:100%;padding:10px;border-radius:8px;border:1px solid #2f3642;background:#0f1115;color:#e6e6e6;font-size:14px;box-sizing:border-box;" placeholder="demo" />
        </div>
        <div>
          <label style="font-weight:600;">类型</label>
          <select id="extract-type" style="width:100%;padding:10px;border-radius:8px;border:1px solid #2f3642;background:#0f1115;color:#e6e6e6;font-size:14px;box-sizing:border-box;">
            <option value="text">text (txt)</option>
            <option value="audio">audio (mp3)</option>
            <option value="video">video (mp4)</option>
            <option value="summary">summary (txt)</option>
          </select>
        </div>
      </div>
      <button type="submit" style="padding:12px;border:none;border-radius:8px;background:#3b82f6;color:#fff;font-size:15px;font-weight:600;cursor:pointer;">提取</button>
      <div id="extract-status" style="padding:10px;border-radius:8px;background:#10131a;min-height:20px;font-size:14px;"></div>
    </form>
  </div>

  <!-- Format tab -->
  <div id="tab-format">
    <form id="format-form" style="display:grid;gap:16px;background:#171a21;border-radius:12px;padding:20px;max-width:600px;">
      <div>
        <label style="font-weight:600;">文本文件 (.txt)</label>
        <input id="format-file" type="file" accept=".txt,text/plain" style="width:100%;padding:10px;border-radius:8px;border:1px solid #2f3642;background:#0f1115;color:#e6e6e6;font-size:14px;box-sizing:border-box;" />
      </div>
      <button type="submit" style="padding:12px;border:none;border-radius:8px;background:#3b82f6;color:#fff;font-size:15px;font-weight:600;cursor:pointer;">格式化</button>
      <div id="format-status" style="padding:10px;border-radius:8px;background:#10131a;min-height:20px;font-size:14px;"></div>
    </form>
  </div>
</div>

<script>
// --- State ---
let currentSessionId = "";
let sessionMessages = [];

// --- Helpers ---
function $$(sel) { return document.querySelector(sel); }
function toast(msg, kind) {
  const el = document.createElement("div");
  el.className = "toast" + (kind === "error" ? " error" : "");
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}
function escHtml(s) {
  const div = document.createElement("div");
  div.textContent = s;
  return div.innerHTML;
}

// --- Navigation ---
function switchTab(tab, link) {
  ["tab-chat", "tab-extract", "tab-format"].forEach(id => {
    $$("#" + id).style.display = id === "tab-" + tab ? "flex" : "none";
  });
  document.querySelectorAll(".nav-item").forEach(a => a.classList.remove("active"));
  if (link) link.classList.add("active");
  $$("#chat-header").textContent =
    tab === "chat" ? (currentSessionId ? "对话中" : "RAG 知识库问答") :
    tab === "extract" ? "视频提取" : "文本格式化";
}

// --- Sessions ---
async function loadSessions() {
  try {
    const resp = await fetch("/chat/sessions");
    const data = await resp.json();
    const list = $$("#session-list");
    list.innerHTML = "";
    (data.sessions || []).forEach(s => {
      const div = document.createElement("div");
      div.className = "sess" + (s.id === currentSessionId ? " active" : "");
      div.innerHTML = `${escHtml(s.title || "新对话")}<span class="time">${escHtml(s.updated_at || "")}</span>`;
      div.onclick = () => openSession(s.id);
      list.appendChild(div);
    });
  } catch (err) {
    console.error("loadSessions:", err);
  }
}

async function openSession(id) {
  currentSessionId = id;
  try {
    const resp = await fetch("/chat/session/" + id);
    const data = await resp.json();
    sessionMessages = data.messages || [];
    renderMessages();
    loadSessions();
    $$("#chat-header").textContent = data.title || "对话中";
  } catch (err) {
    toast("加载会话失败", "error");
  }
}

async function newChat() {
  currentSessionId = "";
  sessionMessages = [];
  $$("#messages").innerHTML = `<div class="msg assistant">🆕 新对话已创建。输入你的第一个问题开始聊天。</div>`;
  $$("#chat-header").textContent = "新对话";
  $$("#chat-input").focus();
  loadSessions();
}

function renderMessages() {
  const container = $$("#messages");
  container.innerHTML = "";
  if (sessionMessages.length === 0) {
    container.innerHTML = `<div class="msg assistant">👋 这个会话还没有消息。输入问题开始吧。</div>`;
    return;
  }
  for (const m of sessionMessages) {
    const div = document.createElement("div");
    div.className = "msg " + (m.role === "user" ? "user" : "assistant");
    div.textContent = m.content;
    container.appendChild(div);
  }
  container.scrollTop = container.scrollHeight;
}

// --- Send Message ---
async function sendMessage() {
  const input = $$("#chat-input");
  const query = input.value.trim();
  if (!query) return;

  const messages = $$("#messages");
  const sendBtn = $$("#send-btn");

  // Add user message
  const userDiv = document.createElement("div");
  userDiv.className = "msg user";
  userDiv.textContent = query;
  messages.appendChild(userDiv);

  input.value = "";
  input.style.height = "auto";

  // Add placeholder
  const placeholder = document.createElement("div");
  placeholder.className = "msg assistant typing";
  placeholder.innerHTML = "思考中<span class='typing'></span>";
  messages.appendChild(placeholder);
  messages.scrollTop = messages.scrollHeight;

  sendBtn.disabled = true;

  try {
    const body = { query: query };
    if (currentSessionId) body.session_id = currentSessionId;

    const resp = await fetch("/chat/query", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });

    const data = await resp.json();

    if (!resp.ok) {
      placeholder.innerHTML = `❌ 错误: ${escHtml(data.error || "Unknown error")}`;
      toast(data.error || "请求失败", "error");
      return;
    }

    // Update session ID if newly created
    if (data.session_id && !currentSessionId) {
      currentSessionId = data.session_id;
      $$("#chat-header").textContent = "新对话";
    }

    let html = escHtml(data.answer || "无回答");
    if (data.chunks && data.chunks.length > 0) {
      html += `<div class="sources"><details><summary>📎 检索到的知识库片段 (${data.chunks.length})</summary>`;
      data.chunks.forEach((c, i) => {
        html += `<div class="chunk"><strong>#${i+1}</strong> (相关度 ${c.score?.toFixed(3) || "-"}): ${escHtml(c.text?.substring(0, 200) || "")}${c.text?.length > 200 ? "..." : ""}</div>`;
      });
      html += `</details></div>`;
    }
    placeholder.innerHTML = html;
    placeholder.classList.remove("typing");

    // Reload sessions to update title
    loadSessions();
  } catch (err) {
    placeholder.innerHTML = `❌ 网络错误: ${escHtml(err.message)}`;
    toast(err.message, "error");
  } finally {
    sendBtn.disabled = false;
    messages.scrollTop = messages.scrollHeight;
  }
}

// --- RAG Health Check ---
async function checkRAGHealth() {
  try {
    const resp = await fetch("/rag/health");
    const data = await resp.json();
    const dot = $$("#rag-status-dot");
    const text = $$("#rag-status-text");
    if (data.rag === "available") {
      dot.className = "status-dot ok";
      text.textContent = "RAG 可用";
    } else {
      dot.className = "status-dot err";
      text.textContent = "RAG 不可用";
    }
  } catch {
    $$("#rag-status-dot").className = "status-dot err";
    $$("#rag-status-text").textContent = "RAG 不可用";
  }
}

// --- Extract form ---
$$("#extract-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const url = $$("#extract-url").value.trim();
  const name = $$("#extract-name").value.trim();
  const type = $$("#extract-type").value.trim();
  const status = $$("#extract-status");
  if (!url || !name) { status.textContent = "URL 和名称必填"; status.style.color = "#ff8b8b"; return; }
  status.textContent = "提取中...";
  status.style.color = "";
  try {
    const resp = await fetch("/extract", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ url, name, type }),
    });
    if (!resp.ok) {
      const data = await resp.json().catch(() => ({}));
      status.textContent = data.error || `请求失败 (${resp.status})`;
      status.style.color = "#ff8b8b";
      return;
    }
    const blob = await resp.blob();
    const disposition = resp.headers.get("content-disposition") || "";
    const match = disposition.match(/filename[^;=\n]*=['"]*([^'";\n]*)['"]*/i);
    const filename = match ? match[1] : name + (type === "video" ? ".mp4" : type === "audio" ? ".mp3" : ".txt");
    const url_ = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url_; a.download = filename;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url_);
    status.textContent = `✅ 已下载 ${filename}，文本已自动索引入知识库`;
    status.style.color = "#9ee6a8";
  } catch (err) {
    status.textContent = err.message;
    status.style.color = "#ff8b8b";
  }
});

// --- Format form ---
$$("#format-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const file = $$("#format-file").files[0];
  const status = $$("#format-status");
  if (!file) { status.textContent = "请选择文件"; status.style.color = "#ff8b8b"; return; }
  status.textContent = "格式化中...";
  status.style.color = "";
  try {
    const fd = new FormData(); fd.append("file", file);
    const resp = await fetch("/format", { method: "POST", body: fd });
    if (!resp.ok) {
      const data = await resp.json().catch(() => ({}));
      status.textContent = data.error || `请求失败 (${resp.status})`;
      status.style.color = "#ff8b8b";
      return;
    }
    const blob = await resp.blob();
    const url_ = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url_; a.download = "formatted.txt";
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url_);
    status.textContent = "✅ 已下载 formatted.txt";
    status.style.color = "#9ee6a8";
  } catch (err) {
    status.textContent = err.message;
    status.style.color = "#ff8b8b";
  }
});

// --- Init ---
checkRAGHealth();
setInterval(checkRAGHealth, 30000);
loadSessions();
</script>
</body>
</html>
